<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700" letter-spacing="1">🏠 California Housing ML — System Architecture</text>
  <line x1="200" y1="48" x2="700" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- ===== ROW 1: DATA SOURCES ===== -->
  <text x="60" y="82" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">DATA SOURCES</text>

  <!-- Sklearn Dataset -->
  <rect x="40" y="90" width="150" height="70" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="115" y="118" text-anchor="middle" fill="white" font-size="13" font-weight="700">Sklearn</text>
  <text x="115" y="135" text-anchor="middle" fill="#bfdbfe" font-size="11">California Housing</text>
  <text x="115" y="150" text-anchor="middle" fill="#bfdbfe" font-size="10">20,640 records × 8 cols</text>

  <!-- Arrow -->
  <line x1="195" y1="125" x2="240" y2="125" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 1: FEATURE ENGINEERING ===== -->
  <text x="250" y="82" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">FEATURE ENGINEERING</text>

  <rect x="245" y="90" width="170" height="70" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="330" y="115" text-anchor="middle" fill="white" font-size="13" font-weight="700">Feature Engineering</text>
  <text x="330" y="133" text-anchor="middle" fill="#fef3c7" font-size="10">+ Haversine distances</text>
  <text x="330" y="148" text-anchor="middle" fill="#fef3c7" font-size="10">8 raw → 19 features</text>

  <!-- Arrow -->
  <line x1="418" y1="125" x2="460" y2="125" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 1: ML MODELS ===== -->
  <text x="468" y="82" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">MODEL TRAINING</text>

  <rect x="463" y="90" width="170" height="70" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="548" y="113" text-anchor="middle" fill="white" font-size="13" font-weight="700">XGBoost Model</text>
  <text x="548" y="130" text-anchor="middle" fill="#ede9fe" font-size="10">Linear / Ridge / RF / XGB</text>
  <text x="548" y="148" text-anchor="middle" fill="#ede9fe" font-size="10">R² = 0.8208  ✓ Winner</text>

  <!-- Arrow -->
  <line x1="636" y1="125" x2="678" y2="125" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 1: MODEL ARTIFACT ===== -->
  <rect x="680" y="90" width="150" height="70" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="755" y="115" text-anchor="middle" fill="white" font-size="13" font-weight="700">model.pkl</text>
  <text x="755" y="133" text-anchor="middle" fill="#d1fae5" font-size="10">Serialized XGBoost</text>
  <text x="755" y="150" text-anchor="middle" fill="#d1fae5" font-size="10">Loaded on API startup</text>

  <!-- ===== VERTICAL ARROW DOWN ===== -->
  <line x1="755" y1="163" x2="755" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 2: FASTAPI ===== -->
  <text x="60" y="222" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">SERVING LAYER</text>

  <rect x="620" y="210" width="270" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="755" y="238" text-anchor="middle" fill="white" font-size="14" font-weight="700">⚡ FastAPI</text>
  <text x="680" y="258" text-anchor="middle" fill="#93c5fd" font-size="10">GET  /</text>
  <text x="680" y="273" text-anchor="middle" fill="#93c5fd" font-size="10">POST /predict</text>
  <text x="820" y="258" text-anchor="middle" fill="#93c5fd" font-size="10">Auto Swagger</text>
  <text x="820" y="273" text-anchor="middle" fill="#93c5fd" font-size="10">/docs UI</text>

  <!-- Arrow down to Render -->
  <line x1="755" y1="293" x2="755" y2="335" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 3: DEPLOYMENT ===== -->
  <text x="60" y="352" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">DEPLOYMENT</text>

  <rect x="620" y="340" width="270" height="70" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="755" y="365" text-anchor="middle" fill="white" font-size="14" font-weight="700">☁️ Render.com</text>
  <text x="755" y="383" text-anchor="middle" fill="#d1fae5" font-size="10">Free cloud hosting · Auto-deploy from GitHub</text>
  <text x="755" y="398" text-anchor="middle" fill="#d1fae5" font-size="10">california-housing-ml-ab74.onrender.com</text>

  <!-- ===== LEFT SIDE: ANALYSIS NOTEBOOKS ===== -->
  <text x="60" y="222" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">ANALYSIS</text>

  <rect x="40" y="230" width="200" height="90" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="255" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">📓 Notebooks</text>
  <text x="140" y="273" text-anchor="middle" fill="#fef3c7" font-size="10">EDA.ipynb — 4 Plotly charts</text>
  <text x="140" y="288" text-anchor="middle" fill="#fef3c7" font-size="10">feature_engineering_v.ipynb</text>
  <text x="140" y="303" text-anchor="middle" fill="#fef3c7" font-size="10">K-Means clustering (k=4)</text>

  <!-- ===== LEFT SIDE: K-MEANS CLUSTERS ===== -->
  <rect x="40" y="340" width="200" height="90" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="365" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">🗺️ Market Segments</text>
  <text x="140" y="383" text-anchor="middle" fill="#ede9fe" font-size="10">Cluster 0: SF Bay Area  $290K</text>
  <text x="140" y="398" text-anchor="middle" fill="#ede9fe" font-size="10">Cluster 2: LA Coastline $300K</text>
  <text x="140" y="413" text-anchor="middle" fill="#ede9fe" font-size="10">Cluster 1/3: Inland     $120-152K</text>

  <!-- Middle section: API Request/Response -->
  <rect x="265" y="230" width="325" height="180" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="427" y="255" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">API REQUEST / RESPONSE</text>
  <line x1="280" y1="262" x2="575" y2="262" stroke="#334155" stroke-width="1"/>

  <!-- Input side -->
  <text x="355" y="278" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">INPUT (8 fields)</text>
  <text x="310" y="295" fill="#94a3b8" font-size="9">MedInc, HouseAge</text>
  <text x="310" y="309" fill="#94a3b8" font-size="9">AveRooms, AveBedrms</text>
  <text x="310" y="323" fill="#94a3b8" font-size="9">Population, AveOccup</text>
  <text x="310" y="337" fill="#94a3b8" font-size="9">Latitude, Longitude</text>

  <!-- Arrow in middle -->
  <line x1="415" y1="310" x2="445" y2="310" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="430" y="303" text-anchor="middle" fill="#10b981" font-size="9">→ 19 features</text>

  <!-- Output side -->
  <text x="510" y="278" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">OUTPUT</text>
  <text x="460" y="295" fill="#94a3b8" font-size="9">predicted_price_usd</text>
  <text x="460" y="309" fill="#94a3b8" font-size="9">coastal_proximity_km</text>
  <text x="460" y="323" fill="#94a3b8" font-size="9">nearest_city_km</text>

  <!-- Bottom note in API box -->
  <rect x="275" y="345" width="305" height="55" rx="6" fill="#1e293b"/>
  <text x="427" y="363" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">🔑 Key Feature: coastal_proximity_km</text>
  <text x="427" y="378" text-anchor="middle" fill="#94a3b8" font-size="9">Haversine distance to CA coastline</text>
  <text x="427" y="393" text-anchor="middle" fill="#94a3b8" font-size="9">Feature importance: 0.54 — #1 predictor</text>

  <!-- ===== BOTTOM: TECH STACK ===== -->
  <rect x="40" y="450" width="820" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="470" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">TECH STACK</text>
  <text x="450" y="488" text-anchor="middle" fill="#64748b" font-size="10">Python · Pandas · Scikit-learn · XGBoost · FastAPI · Plotly · Render.com · GitHub</text>

</svg>
